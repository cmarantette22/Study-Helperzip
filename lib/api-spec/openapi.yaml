openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: projects
    description: Project management
  - name: questions
    description: Question management
  - name: outline
    description: Outline section management
  - name: auth
    description: Authentication
  - name: admin
    description: Admin user management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectBody"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a single project with stats
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectWithStats"
        "404":
          description: Not found
    put:
      operationId: updateProject
      tags: [projects]
      summary: Rename a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectBody"
      responses:
        "200":
          description: Project updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project and all its questions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
  /projects/{id}/questions:
    get:
      operationId: listProjectQuestions
      tags: [projects]
      summary: List questions in a project with optional filter
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: filter
          in: query
          required: false
          schema:
            type: string
            enum: [all, correct, needs_review, unanswered]
      responses:
        "200":
          description: List of questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Question"
  /projects/{id}/reset:
    post:
      operationId: resetProjectAnswers
      tags: [projects]
      summary: Reset answers for questions in a project (optionally filtered)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: filter
          in: query
          required: false
          schema:
            type: string
            enum: [all, correct, needs_review]
      responses:
        "200":
          description: Reset result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResetResult"
  /projects/{id}/outline:
    get:
      operationId: listOutlineSections
      tags: [outline]
      summary: List outline sections for a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of outline sections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OutlineSection"
    post:
      operationId: uploadOutline
      tags: [outline]
      summary: Upload and parse a course outline into sections
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadOutlineBody"
      responses:
        "200":
          description: Parsed outline sections
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OutlineSection"
    delete:
      operationId: deleteAllOutlineSections
      tags: [outline]
      summary: Delete all outline sections for a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: All sections deleted
  /projects/{id}/outline/{sectionId}:
    put:
      operationId: updateOutlineSection
      tags: [outline]
      summary: Update an outline section's title and content
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: sectionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOutlineSectionBody"
      responses:
        "200":
          description: Updated section
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutlineSection"
        "404":
          description: Not found
    delete:
      operationId: deleteOutlineSection
      tags: [outline]
      summary: Delete a single outline section
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: sectionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Section deleted
        "404":
          description: Not found
  /projects/{id}/outline/{sectionId}/deep-explain:
    post:
      operationId: deepExplainSection
      tags: [outline]
      summary: Get in-depth explanation of the principles in an outline section
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: sectionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deep explanation of the section
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeepExplainResult"
        "404":
          description: Not found
  /projects/{id}/outline/{sectionId}/chat:
    post:
      operationId: chatAboutSection
      tags: [outline]
      summary: Follow-up conversation about an outline section
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: sectionId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageBody"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
        "404":
          description: Not found
  /questions:
    get:
      operationId: listQuestions
      tags: [questions]
      summary: List all questions
      responses:
        "200":
          description: List of questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Question"
    post:
      operationId: createQuestion
      tags: [questions]
      summary: Create a question manually
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuestionBody"
      responses:
        "201":
          description: Question created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
  /questions/parse-pdf:
    post:
      operationId: parsePdfQuestions
      tags: [questions]
      summary: Parse multiple questions from an uploaded PDF using AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParsePdfBody"
      responses:
        "200":
          description: Parsed questions from PDF
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParsePdfResult"
  /questions/parse-image:
    post:
      operationId: parseQuestionImage
      tags: [questions]
      summary: Parse a question from an uploaded image using AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParseImageBody"
      responses:
        "200":
          description: Parsed question data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
  /questions/{id}:
    get:
      operationId: getQuestion
      tags: [questions]
      summary: Get a single question
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Question details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
        "404":
          description: Not found
    put:
      operationId: updateQuestion
      tags: [questions]
      summary: Update a question's text and choices
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateQuestionBody"
      responses:
        "200":
          description: Updated question
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
        "404":
          description: Not found
    delete:
      operationId: deleteQuestion
      tags: [questions]
      summary: Delete a question
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
  /questions/{id}/check:
    post:
      operationId: checkAnswer
      tags: [questions]
      summary: Check if the selected answer is correct
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckAnswerBody"
      responses:
        "200":
          description: Answer result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckAnswerResult"
  /questions/{id}/explain:
    post:
      operationId: explainAnswers
      tags: [questions]
      summary: Get AI explanation for why each answer is right or wrong
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: AI explanation for each choice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExplainResult"
  /questions/{id}/deep-explain:
    post:
      operationId: deepExplainQuestion
      tags: [questions]
      summary: Get in-depth explanation of the primary principles at play
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deep explanation of underlying principles
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeepExplainResult"
  /questions/{id}/chat:
    post:
      operationId: chatAboutQuestion
      tags: [questions]
      summary: Follow-up conversation about a question
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageBody"
      responses:
        "200":
          description: AI response to the follow-up message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
  /questions/stats:
    get:
      operationId: getQuestionStats
      tags: [questions]
      summary: Get study statistics
      parameters:
        - name: projectId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Study statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuestionStats"
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change password (required after temp password login)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordBody"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
        "400":
          description: Invalid password
  /admin/users:
    get:
      operationId: listUsers
      tags: [admin]
      summary: List all users (admin only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"
        "403":
          description: Forbidden
    post:
      operationId: createUser
      tags: [admin]
      summary: Create a new user with temp password (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserBody"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserWithPassword"
        "403":
          description: Forbidden
        "409":
          description: Email already exists
  /admin/users/{id}:
    delete:
      operationId: deleteUser
      tags: [admin]
      summary: Delete a user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: User deleted
        "403":
          description: Forbidden
        "404":
          description: Not found
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    Project:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - createdAt
    ProjectWithStats:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        createdAt:
          type: string
          format: date-time
        totalQuestions:
          type: integer
        answeredQuestions:
          type: integer
        correctAnswers:
          type: integer
        incorrectAnswers:
          type: integer
        accuracyPercent:
          type: number
      required:
        - id
        - name
        - createdAt
        - totalQuestions
        - answeredQuestions
        - correctAnswers
        - incorrectAnswers
        - accuracyPercent
    CreateProjectBody:
      type: object
      properties:
        name:
          type: string
      required:
        - name
    ResetResult:
      type: object
      properties:
        resetCount:
          type: integer
      required:
        - resetCount
    Choice:
      type: object
      properties:
        id:
          type: integer
        questionId:
          type: integer
        label:
          type: string
        text:
          type: string
        isCorrect:
          type: boolean
      required:
        - id
        - questionId
        - label
        - text
        - isCorrect
    Question:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
          nullable: true
        questionText:
          type: string
        choices:
          type: array
          items:
            $ref: "#/components/schemas/Choice"
        answered:
          type: boolean
        answeredCorrectly:
          type: boolean
          nullable: true
        multiSelect:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - questionText
        - choices
        - answered
        - multiSelect
        - createdAt
    CreateQuestionBody:
      type: object
      properties:
        questionText:
          type: string
        projectId:
          type: integer
        multiSelect:
          type: boolean
        choices:
          type: array
          items:
            type: object
            properties:
              label:
                type: string
              text:
                type: string
              isCorrect:
                type: boolean
            required:
              - label
              - text
              - isCorrect
      required:
        - questionText
        - choices
    ParsePdfBody:
      type: object
      properties:
        pdfBase64:
          type: string
          description: Base64 encoded PDF data
        projectId:
          type: integer
      required:
        - pdfBase64
    ParsePdfResult:
      type: object
      properties:
        questions:
          type: array
          items:
            $ref: "#/components/schemas/Question"
        totalParsed:
          type: integer
      required:
        - questions
        - totalParsed
    ParseImageBody:
      type: object
      properties:
        imageBase64:
          type: string
          description: Base64 encoded image data
        projectId:
          type: integer
      required:
        - imageBase64
    CheckAnswerBody:
      type: object
      properties:
        choiceId:
          type: integer
        choiceIds:
          type: array
          items:
            type: integer
    CheckAnswerResult:
      type: object
      properties:
        correct:
          type: boolean
        correctChoiceId:
          type: integer
        selectedChoiceId:
          type: integer
        correctChoiceIds:
          type: array
          items:
            type: integer
        selectedChoiceIds:
          type: array
          items:
            type: integer
      required:
        - correct
    ExplainResult:
      type: object
      properties:
        explanations:
          type: array
          items:
            type: object
            properties:
              choiceId:
                type: integer
              label:
                type: string
              isCorrect:
                type: boolean
              explanation:
                type: string
            required:
              - choiceId
              - label
              - isCorrect
              - explanation
      required:
        - explanations
    DeepExplainResult:
      type: object
      properties:
        principles:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              description:
                type: string
              howItApplies:
                type: string
            required:
              - name
              - description
              - howItApplies
        summary:
          type: string
      required:
        - principles
        - summary
    ChatMessageBody:
      type: object
      properties:
        message:
          type: string
        conversationHistory:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
                enum: [user, assistant]
              content:
                type: string
            required:
              - role
              - content
      required:
        - message
    ChatResponse:
      type: object
      properties:
        reply:
          type: string
      required:
        - reply
    OutlineSection:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        title:
          type: string
        content:
          type: string
        orderIndex:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - projectId
        - title
        - content
        - orderIndex
        - createdAt
    UploadOutlineBody:
      type: object
      properties:
        text:
          type: string
          description: Plain text of the course outline
        pdfBase64:
          type: string
          description: Base64 encoded PDF of the course outline
      description: Provide either text or pdfBase64
    QuestionStats:
      type: object
      properties:
        totalQuestions:
          type: integer
        answeredQuestions:
          type: integer
        correctAnswers:
          type: integer
        incorrectAnswers:
          type: integer
        accuracyPercent:
          type: number
      required:
        - totalQuestions
        - answeredQuestions
        - correctAnswers
        - incorrectAnswers
        - accuracyPercent
    UpdateQuestionBody:
      type: object
      properties:
        questionText:
          type: string
        multiSelect:
          type: boolean
        choices:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              label:
                type: string
              text:
                type: string
              isCorrect:
                type: boolean
            required:
              - label
              - text
              - isCorrect
      required:
        - questionText
        - choices
    UpdateOutlineSectionBody:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
      required:
        - title
        - content
    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password
    ChangePasswordBody:
      type: object
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
      required:
        - currentPassword
        - newPassword
    AuthUser:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, user]
        mustChangePassword:
          type: boolean
      required:
        - id
        - name
        - email
        - role
        - mustChangePassword
    CreateUserBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
      required:
        - name
        - email
        - password
    AdminUser:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, user]
        mustChangePassword:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - email
        - role
        - mustChangePassword
        - createdAt
    AdminUserWithPassword:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [admin, user]
        mustChangePassword:
          type: boolean
        tempPassword:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - email
        - role
        - mustChangePassword
        - tempPassword
        - createdAt
